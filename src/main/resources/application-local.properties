# Local fallback database for development when the cloud PostgreSQL endpoint is unreachable.
spring.datasource.url=jdbc:h2:file:./data/smartparking-local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
