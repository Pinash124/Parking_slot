spring.application.name=smart-parking
spring.config.import=optional:file:${user.dir}/.env[.properties]

# Database
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/smartparking;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:600000}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.show-sql=${SHOW_SQL:false}

# Frontend
app.frontend-url=${FRONTEND_URL:http://localhost:5173,http://localhost:5174,http://127.0.0.1:5173,http://127.0.0.1:5174}

# Bootstrap account (override in production)
parking.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@smartparking.local}
parking.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
parking.auth.expose-development-otp=${EXPOSE_DEVELOPMENT_OTP:true}
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}

# Mail
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:dadangnguyenvan@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
parking.auth.mail-from=${MAIL_FROM:${MAIL_USERNAME:dadangnguyenvan@gmail.com}}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_SSL_TRUST:smtp.gmail.com}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# VNPay Sandbox
vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payment-gateways/vnpay/return}

# Personal QR payment (manual staff confirmation)
personal-qr.image-url=${PERSONAL_QR_IMAGE_URL:/payment/vnpay-personal-qr.png}

# Parking business rules
parking.rules.reservation-early-minutes=${RESERVATION_EARLY_MINUTES:30}
parking.rules.reservation-late-minutes=${RESERVATION_LATE_MINUTES:20}
parking.rules.tariff-grace-minutes=${TARIFF_GRACE_MINUTES:10}
parking.rules.day-start=${DAY_TARIFF_START:07:00}
parking.rules.night-start=${NIGHT_TARIFF_START:22:00}
parking.rules.two-wheel-day-turn=${TWO_WHEEL_DAY_TURN:8000}
parking.rules.four-wheel-day-turn=${FOUR_WHEEL_DAY_TURN:35000}
parking.rules.two-wheel-night-hourly=${TWO_WHEEL_NIGHT_HOURLY:3000}
parking.rules.four-wheel-night-hourly=${FOUR_WHEEL_NIGHT_HOURLY:5000}
