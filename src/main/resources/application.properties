spring.application.name=smart-parking

# Database
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/smartparking;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}

# Frontend
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# Bootstrap account (override in production)
parking.bootstrap.admin-email=${BOOTSTRAP_ADMIN_EMAIL:admin@smartparking.local}
parking.bootstrap.admin-password=${BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
parking.auth.expose-development-otp=${EXPOSE_DEVELOPMENT_OTP:true}
google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}

# Mail
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
